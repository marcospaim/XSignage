{% load static %}
{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
	<head>
    <title>Django Tailwind</title>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta http-equiv="X-UA-Compatible" content="ie=edge">
        <script src="{% static 'htmx.min.js' %}" defer></script>
		{% tailwind_css %}
	</head>

    <body class="bg-gray-200" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
        <div class="flex h-screen">
            <!-- Sidebar -->
            {% include 'partials/sidebar.html' %}
    
            <!-- Main Content -->
            <div class="flex-1 flex flex-col ml-64">
                <!-- Navbar -->
                <nav class="bg-white shadow-lg">
                    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div class="flex justify-between h-16">
                            <div class="flex items-center">
                                <span class="text-xl font-semibold text-gray-800">Dashboard</span>
                            </div>
                            <div class="flex items-center space-x-4">
                                <a href="#" class="text-gray-800 hover:text-gray-600">Notifications</a>
                                <a href="#" class="text-gray-800 hover:text-gray-600">Profile</a>
                            </div>
                        </div>
                    </div>
                </nav>
                
                <!-- Content -->
                {% block content %}
               
                {% endblock %}
            </div>
        </div>
    </body>

</html>
