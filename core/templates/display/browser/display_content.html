{% if content.content_type == 'image' %}
    <img src="{{ content.mediafile.file.url }}" alt="Image" class="max-w-full max-h-full object-contain">
{% elif content.content_type == 'video' %}
    <video class="max-w-full max-h-full" autoplay muted loop>
        <source src="{{ content.mediafile.file.url }}" type="video/mp4">
        Your browser does not support the video tag.
    </video>
{% elif content.content_type == 'view' %}
    <iframe src="{% url 'core:custom_page_view' content.custom_page.id %}" class="w-full h-full border-none"></iframe>
{% endif %}
