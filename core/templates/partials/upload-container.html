{% load i18n %}

<div class="bg-white p-8 rounded-lg shadow-lg mt-4 mb-4">
    <h1 class="text-2xl font-bold mb-4">{% trans "File Upload" %}</h1>
    <form id="upload-form" hx-post="{% url 'core:upload_media' %}" hx-encoding="multipart/form-data" hx-target="#media-files-list"  
    hx-on::after-request=" if(event.detail.successful) this.reset()">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="file">
                {% trans "Select a media file:" %}
            </label>
            <input type="file" name="file" id="file" class="border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" >
        </div>
        <button type="submit" class="bg-delft_blue-700 hover:bg-delft_blue-500 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">
            {% trans "Upload" %}
        </button>
    </form>
</div>
